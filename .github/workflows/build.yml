name: CI

on:
  pull_request:
  push:
  schedule:
    - cron: '32 7,19 * * *'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Build Docker image
        run: bash build.sh

      - name: Test Docker image
        run: bash test.sh

      - name: Log in to the Docker container registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
        if: ${{ github.ref == 'refs/heads/main' }}

      - name: Publish the Docker image
        run: source variables.sh && docker push $DOCKER_IMAGE:latest
        if: ${{ github.ref == 'refs/heads/main' }}

      # Install jq (allows Bash to work with JSON)
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq
        # if: ${{ github.ref == 'refs/heads/main' }}

      - name: List Docker images (main branch only)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh api https://api.github.com/user/packages/container/docker-debian-bullseye-min-stage1/versions | jq
        # if: ${{ github.ref == 'refs/heads/main' }}

      - name: Prune old Docker images (main branch only)
        run: python ghcr-prune.py --container 'sha256' --prune-age 3
        # if: ${{ github.ref == 'refs/heads/main' }}

      - name: Log out of the Docker container registry
        run: docker logout ghcr.io
        if: ${{ github.ref == 'refs/heads/main' }}
